{% extends "base.html" %}

{% block title %}Connexion - ML Predictor{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-80 align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-white border-0 text-center pt-4">
                    <i class="fas fa-robot fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold">Bienvenue</h3>
                    <p class="text-muted">Connectez-vous pour accéder à l'application</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user me-2 text-primary"></i>Nom d'utilisateur
                            </label>
                            <input type="text" name="username" class="form-control form-control-lg rounded-3" 
                                   placeholder="ex: johndoe" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-lock me-2 text-primary"></i>Mot de passe
                            </label>
                            <input type="password" name="password" class="form-control form-control-lg rounded-3" 
                                   placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3">
                            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-white border-0 text-center pb-4">
                    <p class="mb-0">Pas encore de compte ? 
                        <a href="{{ url_for('register') }}" class="text-primary fw-semibold">S'inscrire</a>
                    </p>
                    <small class="text-muted">Compte test : test / test123</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
