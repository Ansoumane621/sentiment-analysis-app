{% extends "base.html" %}

{% block title %}Registration - ML Predictor{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-white border-0 text-center pt-4">
                    <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
                    <h3 class="fw-bold">Registration</h3>
                    <p class="text-muted">Create your account for free</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user me-2 text-success"></i>Username
                            </label>
                            <input type="text" name="username" class="form-control form-control-lg rounded-3" 
                                   placeholder="ex: johndoe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-envelope me-2 text-success"></i>Email
                            </label>
                            <input type="email" name="email" class="form-control form-control-lg rounded-3" 
                                   placeholder="exemple@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-key me-2 text-success"></i>Mot de passe
                            </label>
                            <input type="password" name="password" class="form-control form-control-lg rounded-3" 
                                   placeholder="Minimum 6 characters" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-check-circle me-2 text-success"></i>Confirm password
                            </label>
                            <input type="password" name="confirm_password" class="form-control form-control-lg rounded-3" 
                                   placeholder="Retype your password" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 rounded-3">
                            <i class="fas fa-user-plus me-2"></i>Sign up
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-white border-0 text-center pb-4">
                    <p class="mb-0">Already registered? 
                        <a href="{{ url_for('login') }}" class="text-success fw-semibold">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
